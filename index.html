<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retention Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: linear-gradient(145deg, #0a0a14 0%, #111128 50%, #0d0d1a 100%);
    color: #fff;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    padding: 32px 24px;
  }
  .container { max-width: 800px; margin: 0 auto; }
  h1 {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #6ee7b7, #3b82f6, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .subtitle { color: rgba(255,255,255,0.35); font-size: 13px; margin-top: 6px; letter-spacing: 0.5px; }
  .chart-box {
    margin-top: 28px;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 28px 20px 20px;
  }
  .chart-title { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.85); margin: 0 0 4px 8px; }
  .chart-desc { font-size: 12px; color: rgba(255,255,255,0.3); margin: 0 0 24px 8px; }
  .canvas-wrap { position: relative; height: 360px; }
  .cards { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .card {
    flex: 1; min-width: 100px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px; padding: 14px 12px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .card-day { font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 700; margin-bottom: 6px; }
  .card-val { font-size: 20px; font-weight: 800; color: #6ee7b7; }
  .card-target { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 2px; }
  .card-bar { margin-top: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; height: 4px; overflow: hidden; }
  .card-bar-fill { height: 100%; border-radius: 4px; }
  .card-pct { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; }
</style>
</head>
<body>

<div class="container">
  <h1>Retention Dashboard</h1>
  <p class="subtitle">Retention Rate · 현재 vs 목표</p>

  <div class="chart-box">
    <h2 class="chart-title">Retention Rate</h2>
    <p class="chart-desc">D1 ~ D28 리텐션 현재 vs 목표</p>
    <div class="canvas-wrap">
      <canvas id="retChart"></canvas>
    </div>
    <div class="cards" id="cards"></div>
  </div>
</div>

<script>
// ── 데이터 (여기만 수정하면 됩니다) ──
const retentionData = [
  { day: "D1",  current: 44,  target: 46 },
  { day: "D7",  current: 20,  target: 25 },
  { day: "D14", current: 12,  target: 18 },
  { day: "D21", current: 8,   target: 13 },
  { day: "D28", current: 4.2, target: 10 },
];

// ── 차트 ──
const ctx = document.getElementById('retChart').getContext('2d');

const greenGrad = ctx.createLinearGradient(0, 0, 0, 360);
greenGrad.addColorStop(0, 'rgba(110,231,183,0.25)');
greenGrad.addColorStop(1, 'rgba(110,231,183,0)');

const pinkGrad = ctx.createLinearGradient(0, 0, 0, 360);
pinkGrad.addColorStop(0, 'rgba(244,114,182,0.15)');
pinkGrad.addColorStop(1, 'rgba(244,114,182,0)');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: retentionData.map(d => d.day),
    datasets: [
      {
        label: '현재',
        data: retentionData.map(d => d.current),
        borderColor: '#6ee7b7',
        backgroundColor: greenGrad,
        borderWidth: 3,
        fill: true,
        tension: 0.3,
        pointRadius: 5,
        pointBackgroundColor: '#6ee7b7',
        pointBorderWidth: 0,
        pointHoverRadius: 7,
      },
      {
        label: '목표',
        data: retentionData.map(d => d.target),
        borderColor: '#f472b6',
        backgroundColor: pinkGrad,
        borderWidth: 2.5,
        borderDash: [6, 4],
        fill: true,
        tension: 0.3,
        pointRadius: 5,
        pointBackgroundColor: '#f472b6',
        pointBorderWidth: 0,
        pointHoverRadius: 7,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { intersect: false, mode: 'index' },
    plugins: {
      legend: {
        position: 'bottom',
        labels: {
          color: 'rgba(255,255,255,0.6)',
          usePointStyle: true,
          pointStyle: 'circle',
          padding: 20,
          font: { size: 12 }
        }
      },
      tooltip: {
        backgroundColor: 'rgba(15,15,25,0.95)',
        borderColor: 'rgba(255,255,255,0.1)',
        borderWidth: 1,
        titleColor: 'rgba(255,255,255,0.5)',
        titleFont: { size: 11, weight: 400 },
        bodyFont: { size: 13, weight: 600 },
        padding: 14,
        cornerRadius: 12,
        callbacks: {
          label: function(ctx) {
            const i = ctx.dataIndex;
            const d = retentionData[i];
            const gap = Math.abs(d.target - d.current);
            if (ctx.datasetIndex === 0) return `현재: ${d.current}%`;
            return `목표: ${d.target}%  (Gap: ${gap}%p)`;
          }
        }
      }
    },
    scales: {
      x: {
        ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 13, weight: 600 } },
        grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }
      },
      y: {
        ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 11 }, callback: v => v + '%' },
        grid: { color: 'rgba(255,255,255,0.05)', drawBorder: false }
      }
    }
  }
});

// ── 하단 카드 ──
const cardsEl = document.getElementById('cards');
retentionData.forEach(d => {
  const pct = Math.round((d.current / d.target) * 100);
  const barColor = pct >= 80
    ? 'linear-gradient(90deg, #6ee7b7, #34d399)'
    : 'linear-gradient(90deg, #fbbf24, #f59e0b)';
  cardsEl.innerHTML += `
    <div class="card">
      <div class="card-day">${d.day}</div>
      <div class="card-val">${d.current}%</div>
      <div class="card-target">목표 ${d.target}%</div>
      <div class="card-bar">
        <div class="card-bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor}"></div>
      </div>
      <div class="card-pct">달성 ${pct}%</div>
    </div>
  `;
});
</script>
</body>
</html>
